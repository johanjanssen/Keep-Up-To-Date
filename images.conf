#!/usr/bin/env bash
# images.conf — Shared image list sourced by all scanning scripts.
# Usage: source "$(dirname "$0")/../images.conf"  (from any scripts/ directory)

BASE_IMAGES=(

    "ghcr.io/graalvm/native-image-community:25"
)

APP_IMAGES=(
    "hello-conference:jre-temurin"
    "hello-conference:jlink-full-distroless-base"
    "hello-conference:jlink-distroless-base"
    "hello-conference:jlink-netty-distroless-base"
    "hello-conference:jlink-cds-distroless-base"
    "hello-conference:jlink-tuned-distroless-base"
    "hello-conference:crac-azul-distroless-base"
    "hello-conference:native-debian-slim"
    "hello-conference:native-minimal-distroless-static"
    "hello-conference:native-scratch"
    "hello-conference:native-netty-scratch"
)

ALL_IMAGES=("${BASE_IMAGES[@]}" "${APP_IMAGES[@]}")

# Convert image name to safe filename: eclipse-temurin:25-jre → eclipse-temurin_25-jre
image_to_filename() {
    echo "$1" | tr '/:' '__'
}

